<app-loader [loaderStatus]="loaderService.loader$ | async" />
<form
    (ngSubmit)="onSubmit()"
    [formGroup]="authorizationForm"
    [ngClass]="submitted ? 'opacity-0' : ''"
>
    <div class="d-flex flex-column mt-3">
        <div>
            <input
                placeholder="Логин"
                type="text"
                formControlName="login"
                class="form-input"
                [ngClass]="{ 'input-error': login?.invalid }"
            />
        </div>
        <div class="mt-3">
            <input
                placeholder="Пароль"
                type="password"
                formControlName="password"
                class="form-input"
                [ngClass]="{
                    'input-error': password?.invalid,
                }"
            />
        </div>
    </div>
    <div class="mt-3">
        <mat-checkbox
            [disableRipple]="true"
            formControlName="saveInStore"
            class=""
            >Сохранить пользователя в хранилище</mat-checkbox
        >
    </div>
    <div class="mt-3 d-flex justify-content-center">
        <button
            mat-flat-button
            type="submit"
            [disabled]="authorizationForm.invalid"
        >
            Войти
        </button>
    </div>
</form>
