<div class="search-wrapper position-fixed z-3">
    <mat-form-field class="w-100">
        <input #inputSearch matInput placeholder="Поиск..." />
    </mat-form-field>
</div>
<div
    class="tours-wrapper"
    appHighlightActive
    #highlightActiveDirective
    selector="app-tour-card"
    [initFirst]="true"
    (onEnter)="onEnter($event)"
    *ngIf="allTours?.length"
>
    @if (!renderedTours.length) {
        <p>Туры не найдены</p>
    }
    @for (tour of renderedTours; track tour.id) {
        <app-tour-card [tour]="tour" [handleShowModal]="handleShowModal" />
    }
</div>
<nz-modal
    [nzTitle]="mapCountryName"
    nzCentered
    nzDraggable
    nzNoAnimation
    (nzOnCancel)="showModal = false"
    (nzOnOk)="showModal = false"
    [(nzVisible)]="showModal"
>
    <ng-container *nzModalContent>

        @if (weatherData) {
            <p>Погода: {{weatherData.currentWeather}}</p>
            <p *ngIf="weatherData.rain > 0">Идет дождь</p>
            <p *ngIf="weatherData.snowfall > 0">Идет снег</p>
        }

        <app-map [location]="location" />
    </ng-container>
</nz-modal>
