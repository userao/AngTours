<div class="search-wrapper">
    <mat-form-field class="w-100">
        <input matInput placeholder="Поиск..." (input)="searchTours($event)"/>
    </mat-form-field>
</div>
<div
    class="tours-wrapper"
    appHighlightActive
    selector="app-tour-card"
    [initFirst]="true"
    (onEnter)="onEnter($event)"
    *ngIf="renderedTours?.length > 0"
>
    @for (tour of renderedTours; track tour.id) {
        <app-tour-card [tour]="tour" />
    }
</div>
