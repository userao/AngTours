<mat-card class="h-100 d-block" appearance="outlined">
    <mat-card-header class="d-block">
        <mat-card-title class="card-title">{{ tour.name }}</mat-card-title>
        <mat-card-subtitle>{{ tour.tourOperator }}</mat-card-subtitle>
    </mat-card-header>
    <div class="tour-image">
        <img src="/img/{{ tour.img }}" />
    </div>
    <mat-card-content>
        <p class="card-description">
            {{ tour.description }}
        </p>
    </mat-card-content>
</mat-card>
